<svg width="900" height="1380" viewBox="0 0 900 1380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="70" y="10" width="760" height="1320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#120720" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="shell" x1="160" y1="40" x2="740" y2="1240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.5" stop-color="#5B21B6"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="bezel" x1="250" y1="120" x2="650" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8E7DA"/>
      <stop offset="1" stop-color="#B8B7AB"/>
    </linearGradient>
    <linearGradient id="screen" x1="280" y1="180" x2="620" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F8D0"/>
      <stop offset="1" stop-color="#9BBC0F"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="275" y="185" width="350" height="300" rx="10"/>
    </clipPath>
    <style>
      .pixel { font-family: "Courier New", monospace; }
      .small { font-size: 22px; }
      .mid { font-size: 26px; }
      .big { font-size: 34px; font-weight: 700; }
      .badge { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="900" height="1380" fill="#0F172A"/>
  <text x="450" y="68" text-anchor="middle" class="pixel mid" fill="#E9D5FF">JANAEL OLIVEIRA // PROFILE CARTRIDGE</text>

  <g filter="url(#shadow)">

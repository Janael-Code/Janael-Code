<svg width="900" height="1380" viewBox="0 0 900 1380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="70" y="10" width="760" height="1320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#120720" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="shell" x1="160" y1="40" x2="740" y2="1240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.5" stop-color="#5B21B6"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="bezel" x1="250" y1="120" x2="650" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8E7DA"/>
      <stop offset="1" stop-color="#B8B7AB"/>
    </linearGradient>
    <linearGradient id="screen" x1="280" y1="180" x2="620" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F8D0"/>
      <stop offset="1" stop-color="#9BBC0F"/>
    </linearGradient>
    <style>
      .pixel { font-family: "Courier New", monospace; }
      .small { font-size: 22px; }
      .mid { font-size: 26px; }
      .big { font-size: 34px; font-weight: 700; }
      .badge { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="900" height="1380" fill="#0F172A"/>
  <text x="450" y="68" text-anchor="middle" class="pixel mid" fill="#E9D5FF">JANAEL OLIVEIRA // PROFILE CARTRIDGE</text>

  <g filter="url(#shadow)">
    <rect x="160" y="90" width="580" height="1180" rx="48" fill="url(#shell)"/>
    <rect x="180" y="110" width="540" height="1140" rx="38" stroke="#C4B5FD" stroke-opacity="0.26" stroke-width="4"/>
    <rect x="248" y="150" width="404" height="408" rx="24" fill="url(#bezel)"/>
    <rect x="275" y="185" width="350" height="300" rx="10" fill="url(#screen)" stroke="#0F380F" stroke-width="4"/>

    <circle cx="278" cy="165" r="8" fill="#FE5F55"/>
    <circle cx="302" cy="165" r="8" fill="#F0B429"/>
    <circle cx="326" cy="165" r="8" fill="#2ECC71"/>
    <text x="607" y="171" text-anchor="end" class="pixel small" fill="#5B21B6">boot.seq</text>

    <text x="300" y="225" class="pixel small" fill="#0F380F" opacity="0">
      &gt; power on
      <set attributeName="opacity" to="1" begin="0.2s" fill="freeze" />
    </text>
    <text x="300" y="255" class="pixel small" fill="#0F380F" opacity="0">
      loading java........ ok
      <set attributeName="opacity" to="1" begin="0.7s" fill="freeze" />
    </text>
    <text x="300" y="285" class="pixel small" fill="#0F380F" opacity="0">
      loading javascript.. ok
      <set attributeName="opacity" to="1" begin="1.2s" fill="freeze" />
    </text>
    <text x="300" y="315" class="pixel small" fill="#0F380F" opacity="0">
      loading node.js..... ok
      <set attributeName="opacity" to="1" begin="1.7s" fill="freeze" />
    </text>
    <text x="300" y="345" class="pixel small" fill="#0F380F" opacity="0">
      loading docker...... ok
      <set attributeName="opacity" to="1" begin="2.2s" fill="freeze" />
    </text>
    <text x="300" y="375" class="pixel small" fill="#0F380F" opacity="0">
      loading tasy api..... ok
      <set attributeName="opacity" to="1" begin="2.7s" fill="freeze" />
    </text>

    <rect x="300" y="403" width="0" height="14" rx="7" fill="#306230">
      <animate attributeName="width" from="0" to="280" dur="1.1s" begin="3.1s" fill="freeze" />
    </rect>
    <text x="300" y="448" class="pixel mid" fill="#0F380F" opacity="0">
      READY FOR BATTLE
      <set attributeName="opacity" to="1" begin="4.1s" fill="freeze" />
    </text>

    <text x="450" y="620" text-anchor="middle" class="pixel big" fill="#F5F3FF">GAME BOY PROFILE</text>
    <text x="450" y="658" text-anchor="middle" class="pixel small" fill="#DDD6FE">integracoes | dados | sistemas</text>

    <text x="240" y="730" class="pixel big" fill="#F5F3FF">PLAYER NAME</text>
    <rect x="236" y="745" width="426" height="2" fill="#C4B5FD" fill-opacity="0.35"/>
    <text x="240" y="792" class="pixel mid" fill="#F5F3FF">Janael Oliveira</text>
    <text x="240" y="830" class="pixel small" fill="#E9D5FF">Elite Dev &amp; UX Architect</text>

    <text x="240" y="900" class="pixel big" fill="#F5F3FF">MAIN QUESTS</text>
    <rect x="236" y="915" width="426" height="2" fill="#C4B5FD" fill-opacity="0.35"/>
    <text x="240" y="960" class="pixel small" fill="#EDE9FE">+ APIs seguras com Java, Node e PHP</text>
    <text x="240" y="995" class="pixel small" fill="#EDE9FE">+ BI, dados e automacao de processos</text>
    <text x="240" y="1030" class="pixel small" fill="#EDE9FE">+ Integracoes com TASY e sistemas legados</text>
    <text x="240" y="1065" class="pixel small" fill="#EDE9FE">+ UX para equipes operacionais</text>

    <text x="240" y="1135" class="pixel big" fill="#F5F3FF">BATTLE STATS</text>
    <rect x="236" y="1150" width="426" height="2" fill="#C4B5FD" fill-opacity="0.35"/>
    <text x="240" y="1192" class="pixel badge" fill="#EDE9FE">SECURITY</text>
    <rect x="390" y="1176" width="220" height="16" rx="8" fill="#2E1065"/>
    <rect x="390" y="1176" width="198" height="16" rx="8" fill="#A78BFA"/>
    <text x="240" y="1226" class="pixel badge" fill="#EDE9FE">AUTOMATION</text>
    <rect x="390" y="1210" width="220" height="16" rx="8" fill="#2E1065"/>
    <rect x="390" y="1210" width="188" height="16" rx="8" fill="#A78BFA"/>
  </g>
</svg>

          <path d="M-38 0C-40 -24 -16 -42 18 -42C42 -42 62 -24 58 4C48 26 14 40 -18 40C-28 40 -36 28 -38 0Z" fill="#5B6CFF"/>
          <circle cx="18" cy="-12" r="5" fill="#24324A"/>
          <circle cx="34" cy="-4" r="4" fill="#24324A"/>

    <text x="0" y="92" text-anchor="middle" class="pixel sub" fill="#E9D5FF">saude</text>
  </g>
  <g transform="translate(690 360)">
    <use href="#pokebadge" style="--badge-fill:#38BDF8"/>
    <text x="0" y="6" text-anchor="middle" class="pixel label" fill="#111827">API</text>
    <text x="0" y="92" text-anchor="middle" class="pixel sub" fill="#E9D5FF">rest</text>
  </g>
  <g transform="translate(880 360)">
    <use href="#pokebadge" style="--badge-fill:#34D399"/>
    <text x="0" y="6" text-anchor="middle" class="pixel label" fill="#111827">SQL</text>
    <text x="0" y="92" text-anchor="middle" class="pixel sub" fill="#E9D5FF">queries</text>
